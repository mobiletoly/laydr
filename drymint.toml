version = "v0"

[index]
# Keep indexing deterministic and low-noise for local dev.
ignore = [
  "**/.gradle/**",
  "**/.pytest_cache/**",
  "**/.venv/**",
  "**/__pycache__/**",
  "**/build/**",
  "**/dist/**",
  "**/node_modules/**",
  "**/target/**",
  "**/vendor/**",
  "**/venv/**",
  ".drymint/**",
  ".git/**",
  ".gradle/**",
  ".pytest_cache/**",
  ".venv/**",
  "__pycache__/**",
  "build/**",
  "dist/**",
  "node_modules/**",
  "target/**",
  "vendor/**",
  "venv/**",
]

[plugins.kotlin]
enabled = true

[languages.kotlin.domains]
rules = [
  { domain = "tests", match = ["**/src/test/**", "**/src/*Test/**", "**/*Test.kt", "**/*Tests.kt"] },
  { domain = "main", match = ["**/*.kt"] },
]

[[languages.kotlin.resolution.partitions]]
id = "laydr-core-common-main"
match = ["laydr-core/src/commonMain/kotlin/**"]

[[languages.kotlin.resolution.partitions]]
id = "laydr-compose-common-main"
match = ["laydr-compose/src/commonMain/kotlin/**"]
depends_on = ["laydr-core-common-main"]

[[languages.kotlin.resolution.partitions]]
id = "laydr-codegen-main"
match = ["laydr-codegen/src/main/kotlin/**"]

[[languages.kotlin.resolution.partitions]]
id = "laydr-codegen-test"
match = ["laydr-codegen/src/test/kotlin/**"]
depends_on = ["laydr-codegen-main"]

[[languages.kotlin.resolution.partitions]]
id = "laydr-gradle-plugin-main"
match = ["laydr-gradle-plugin/src/main/kotlin/**"]
depends_on = ["laydr-codegen-main"]

[[languages.kotlin.resolution.partitions]]
id = "laydr-gradle-plugin-test"
match = ["laydr-gradle-plugin/src/test/kotlin/**"]
depends_on = ["laydr-gradle-plugin-main", "laydr-codegen-main"]

[[languages.kotlin.resolution.partitions]]
id = "compose-basic-shared-common-main"
match = ["examples/compose-basic/shared/src/commonMain/kotlin/**"]
depends_on = ["laydr-compose-common-main", "laydr-core-common-main"]

[[languages.kotlin.resolution.partitions]]
id = "compose-basic-desktop-main"
match = ["examples/compose-basic/desktopApp/src/main/kotlin/**"]
depends_on = ["compose-basic-shared-common-main"]
